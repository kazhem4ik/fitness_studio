<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Клиенты">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="description" content="Персональный ежедневник записей клиентов">

    <title>Клиенты | Фитнес</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/clients/manifest.json">
    <link rel="apple-touch-icon" href="/clients/static/icons/icon-192.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/clients/static/css/style.css">
</head>
<body>
    <!-- ==================== LOGIN SCREEN ==================== -->
    <div id="login-screen" class="screen active">
        <div class="login-container">
            <div class="login-logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="48" height="48" rx="12" fill="url(#grad1)"/>
                        <path d="M14 34V14h4v8h12v-8h4v20h-4v-8H18v8h-4z" fill="white"/>
                        <defs>
                            <linearGradient id="grad1" x1="0" y1="0" x2="48" y2="48">
                                <stop offset="0%" stop-color="#7c3aed"/>
                                <stop offset="100%" stop-color="#2563eb"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 class="login-title">Fitness Planner</h1>
                <p class="login-subtitle">Ежедневник записей</p>
            </div>

            <form id="login-form" class="login-form" autocomplete="on">
                <div class="form-group">
                    <input type="text" id="login-input" name="username" autocomplete="username"
                           placeholder="Логин" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password-input" name="password" autocomplete="current-password"
                           placeholder="Пароль" required>
                </div>
                <button type="submit" id="login-btn" class="btn-primary btn-login">
                    <span class="btn-text">Войти</span>
                    <span class="btn-loader hidden">
                        <span class="spinner"></span>
                    </span>
                </button>
                <p id="login-error" class="login-error hidden"></p>
            </form>
        </div>
    </div>

    <!-- ==================== MAIN APP ==================== -->
    <div id="app-screen" class="screen">
        <!-- Header -->
        <header id="app-header" class="app-header">
            <div class="header-top">
                <div class="header-left">
                    <h2 id="header-title" class="header-title">Сегодня</h2>
                    <p id="header-date" class="header-date"></p>
                </div>
                <div class="header-right">
                    <button id="btn-today" class="btn-icon" title="Сегодня">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                            <circle cx="12" cy="16" r="2" fill="currentColor"/>
                        </svg>
                    </button>
                    <button id="btn-menu" class="btn-icon" title="Меню">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="5" r="1.5" fill="currentColor"/>
                            <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
                            <circle cx="12" cy="19" r="1.5" fill="currentColor"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- View Tabs -->
            <div class="view-tabs">
                <button class="tab active" data-view="day">День</button>
                <button class="tab" data-view="week">Неделя</button>
                <button class="tab" data-view="month">Месяц</button>
            </div>
        </header>

        <!-- Dropdown Menu -->
        <div id="dropdown-menu" class="dropdown-menu hidden">
            <button id="btn-logout" class="dropdown-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                    <polyline points="16,17 21,12 16,7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                <span>Выйти</span>
            </button>
        </div>

        <!-- ===== DAY VIEW ===== -->
        <div id="view-day" class="view active">
            <!-- Date Navigation -->
            <div class="date-nav">
                <button id="day-prev" class="btn-nav">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="15,18 9,12 15,6"/>
                    </svg>
                </button>
                <button id="day-date-display" class="date-display">
                    <span id="day-date-text"></span>
                </button>
                <button id="day-next" class="btn-nav">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="9,6 15,12 9,18"/>
                    </svg>
                </button>
            </div>

            <!-- Day Timeline -->
            <div id="day-timeline" class="day-timeline">
                <!-- Slots will be generated by JS -->
            </div>

            <!-- Empty State -->
            <div id="day-empty" class="empty-state hidden">
                <div class="empty-icon">📅</div>
                <p class="empty-text">Нет записей на этот день</p>
                <p class="empty-hint">Нажмите +, чтобы добавить</p>
            </div>
        </div>

        <!-- ===== WEEK VIEW ===== -->
        <div id="view-week" class="view">
            <div class="date-nav">
                <button id="week-prev" class="btn-nav">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="15,18 9,12 15,6"/>
                    </svg>
                </button>
                <span id="week-date-text" class="date-display"></span>
                <button id="week-next" class="btn-nav">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="9,6 15,12 9,18"/>
                    </svg>
                </button>
            </div>
            <div id="week-grid" class="week-grid">
                <!-- Generated by JS -->
            </div>
        </div>

        <!-- ===== MONTH VIEW ===== -->
        <div id="view-month" class="view">
            <div class="date-nav">
                <button id="month-prev" class="btn-nav">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="15,18 9,12 15,6"/>
                    </svg>
                </button>
                <span id="month-date-text" class="date-display"></span>
                <button id="month-next" class="btn-nav">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="9,6 15,12 9,18"/>
                    </svg>
                </button>
            </div>
            <div class="month-weekdays">
                <span>Пн</span><span>Вт</span><span>Ср</span><span>Чт</span><span>Пт</span><span>Сб</span><span>Вс</span>
            </div>
            <div id="month-grid" class="month-grid">
                <!-- Generated by JS -->
            </div>
        </div>

        <!-- FAB Button -->
        <button id="fab-add" class="fab" title="Новая запись">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
        </button>
    </div>

    <!-- ==================== APPOINTMENT MODAL ==================== -->
    <div id="appointment-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-sheet">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <h3 id="modal-title">Новая запись</h3>
                <button id="modal-close" class="btn-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form id="appointment-form" class="modal-body">
                <div class="form-group">
                    <label for="apt-client-name">Имя клиента *</label>
                    <input type="text" id="apt-client-name" placeholder="Введите имя" required autocomplete="off">
                    <div id="client-suggestions" class="suggestions hidden"></div>
                </div>

                <div class="form-group">
                    <label for="apt-client-phone">Телефон</label>
                    <input type="tel" id="apt-client-phone" placeholder="+7 (___) ___-__-__">
                </div>

                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="apt-date">Дата *</label>
                        <input type="date" id="apt-date" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="apt-time-start">Начало *</label>
                        <input type="time" id="apt-time-start" required>
                    </div>
                    <div class="form-group flex-1">
                        <label for="apt-time-end">Конец *</label>
                        <input type="time" id="apt-time-end" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="apt-training-type">Тип тренировки</label>
                    <select id="apt-training-type">
                        <option value="">Не указан</option>
                        <option value="Персональная">Персональная</option>
                        <option value="Групповая">Групповая</option>
                        <option value="Растяжка">Растяжка</option>
                        <option value="Кардио">Кардио</option>
                        <option value="Силовая">Силовая</option>
                        <option value="Функциональная">Функциональная</option>
                        <option value="Йога">Йога</option>
                        <option value="Пилатес">Пилатес</option>
                        <option value="Другое">Другое</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group flex-1">
                        <label for="apt-price">Цена (₽)</label>
                        <input type="number" id="apt-price" placeholder="0" min="0" step="100">
                    </div>
                    <div class="form-group flex-1">
                        <label for="apt-payment-method">Оплата</label>
                        <select id="apt-payment-method">
                            <option value="">—</option>
                            <option value="cash">Наличные</option>
                            <option value="card">Карта</option>
                            <option value="transfer">Перевод</option>
                        </select>
                    </div>
                </div>

                <div class="form-group form-check-row">
                    <label class="check-label">
                        <input type="checkbox" id="apt-is-paid">
                        <span class="checkmark"></span>
                        <span>Оплачено</span>
                    </label>
                </div>

                <div class="form-group">
                    <label for="apt-notes">Заметки</label>
                    <textarea id="apt-notes" rows="3" placeholder="Комментарии, пожелания..."></textarea>
                </div>

                <div class="modal-actions">
                    <button type="button" id="btn-delete-apt" class="btn-danger hidden">Удалить</button>
                    <button type="submit" id="btn-save-apt" class="btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast hidden">
        <span id="toast-message"></span>
    </div>

    <!-- Scripts -->
    <script src="/clients/static/js/api.js"></script>
    <script src="/clients/static/js/auth.js"></script>
    <script src="/clients/static/js/calendar.js"></script>
    <script src="/clients/static/js/appointments.js"></script>
    <script src="/clients/static/js/app.js"></script>
</body>
</html>
