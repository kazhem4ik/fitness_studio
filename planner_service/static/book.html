<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Запись на тренировку</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text: #ffffff;
            --text-secondary: #a1a1aa;
            --border: #333333;
            --radius: 12px;
            --error: #ef4444;
            --success: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 24px;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-secondary);
            font-size: 15px;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        input[type="text"], input[type="tel"], input[type="date"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 16px;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }
        
        /* Изменение цвета иконки календаря для input[type="date"] в темной теме */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        .slots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }

        .slot-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            color: var(--text);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .slot-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
        }

        .slot-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .slot-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover:not(:disabled) {
            background: var(--primary-hover);
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
        }

        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: block;
        }
        .message.success {
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
            border: 1px solid rgba(34, 197, 94, 0.2);
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Запись на тренировку</h1>
            <p>Выберите удобное время и оставьте контакты</p>
        </header>

        <div id="booking-form-container">
            <div class="card">
                <div class="form-group">
                    <label for="date-select">Выберите дату</label>
                    <input type="date" id="date-select" required>
                </div>

                <div class="form-group">
                    <label>Доступное время</label>
                    <div id="slots-container" class="slots-grid">
                        <div class="loading">Выберите дату, чтобы увидеть слоты</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="form-group">
                    <label for="client-name">Ваше имя</label>
                    <input type="text" id="client-name" placeholder="Иван Иванов" required>
                </div>
                <div class="form-group">
                    <label for="client-phone">Номер телефона</label>
                    <input type="tel" id="client-phone" placeholder="+7 (999) 000-00-00" required>
                </div>

                <button class="btn-submit" id="btn-submit" disabled>Записаться</button>
                <div id="status-message" class="message"></div>
            </div>
        </div>

        <div id="success-container" style="display: none; text-align: center; margin-top: 40px;">
            <div style="font-size: 64px; color: var(--success); margin-bottom: 16px;">✓</div>
            <h2>Вы успешно записаны!</h2>
            <p style="color: var(--text-secondary); margin-top: 8px;">Ждём вас на тренировке.</p>
        </div>
    </div>

    <script src="/clients/static/js/public_booking.js?v=2"></script>
</body>
</html>
