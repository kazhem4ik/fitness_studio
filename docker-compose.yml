version: '3.8'

services:
  bot_service:
    build:
      context: ./bot_service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./database:/database
    environment:
      - PYTHONPATH=/app
    env_file:
      - .env
    command: uvicorn bot_service.main:app --host 0.0.0.0 --port 8000

  planner_service:
    build:
      context: ./planner_service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - .:/app
      - ./database:/database
    environment:
      - PYTHONPATH=/app
    env_file:
      - .env
    command: uvicorn planner_service.main:app --host 0.0.0.0 --port 8001

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./landing_page:/usr/share/nginx/html/landing:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - bot_service
      - planner_service
